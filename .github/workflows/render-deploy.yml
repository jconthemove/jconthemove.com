name: Trigger Render Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
    steps:
      - name: Check deploy hook secret
        if: env.RENDER_DEPLOY_HOOK_URL == ''
        run: |
          echo "RENDER_DEPLOY_HOOK_URL is not set."
          echo "Add the Render deploy hook URL as a GitHub Actions secret to force Render deploys on every main push."

      - name: Trigger Render deploy hook
        if: env.RENDER_DEPLOY_HOOK_URL != ''
        run: |
          curl --fail --show-error --silent --request POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deploy hook triggered."
