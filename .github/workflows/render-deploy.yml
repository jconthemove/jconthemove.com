name: Trigger Render Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: render-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID || vars.RENDER_SERVICE_ID }}
      PUBLIC_HEALTH_URL: ${{ vars.PUBLIC_HEALTH_URL || 'https://jc-on-the-move.onrender.com/health' }}
      EXPECTED_COMMIT: ${{ github.sha }}
      DEPLOY_WAIT_ATTEMPTS: ${{ vars.DEPLOY_WAIT_ATTEMPTS || '40' }}
      DEPLOY_WAIT_SECONDS: ${{ vars.DEPLOY_WAIT_SECONDS || '30' }}
      DEPLOY_CHECK_TIMEOUT_MS: ${{ vars.DEPLOY_CHECK_TIMEOUT_MS || '15000' }}
      REQUIRE_RENDER_TRIGGER: ${{ vars.REQUIRE_RENDER_TRIGGER || 'false' }}
    steps:
      - name: Checkout deploy verifier
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build release artifact
        run: npm run build

      - name: Stop if Render trigger is missing
        if: env.RENDER_DEPLOY_HOOK_URL == '' && (env.RENDER_API_KEY == '' || env.RENDER_SERVICE_ID == '') && env.REQUIRE_RENDER_TRIGGER == 'true'
        run: |
          echo "::error::No explicit Render deploy trigger is configured."
          echo "Add either:"
          echo "  1. GitHub Actions secret RENDER_DEPLOY_HOOK_URL"
          echo "  2. GitHub Actions secrets RENDER_API_KEY and RENDER_SERVICE_ID"
          echo "Or set repository variable REQUIRE_RENDER_TRIGGER=false to wait for Render Git auto-deploy."
          exit 1

      - name: Check Render trigger configuration
        if: env.RENDER_DEPLOY_HOOK_URL == '' && (env.RENDER_API_KEY == '' || env.RENDER_SERVICE_ID == '')
        run: |
          echo "::warning::No explicit Render deploy trigger is configured."
          echo "The workflow will wait for Render Git auto-deploy."
          echo "For forced deploys, add either:"
          echo "  1. GitHub secret RENDER_DEPLOY_HOOK_URL"
          echo "  2. GitHub secrets RENDER_API_KEY and RENDER_SERVICE_ID"

      - name: Trigger Render deploy hook
        if: env.RENDER_DEPLOY_HOOK_URL != ''
        run: |
          curl --fail --show-error --silent --request POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deploy hook triggered."

      - name: Trigger Render deploy API
        if: env.RENDER_DEPLOY_HOOK_URL == '' && env.RENDER_API_KEY != '' && env.RENDER_SERVICE_ID != ''
        run: |
          curl --fail --show-error --silent \
            --request POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Content-Type: application/json" \
            --data '{}'
          echo "Render deploy API triggered for service $RENDER_SERVICE_ID."

      - name: Verify public deployment
        run: |
          for attempt in $(seq 1 "$DEPLOY_WAIT_ATTEMPTS"); do
            echo "Production verify attempt $attempt/$DEPLOY_WAIT_ATTEMPTS"
            if node scripts/check-production-deploy.mjs "$PUBLIC_HEALTH_URL"; then
              exit 0
            fi
            sleep "$DEPLOY_WAIT_SECONDS"
          done
          echo "Render deploy did not become publicly verifiable in time."
          exit 1
