name: Verify Render Deployment

on:
  workflow_run:
    workflows:
      - Trigger Render Deploy
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      health_url:
        description: Public health URL to verify
        required: false
        default: https://jc-on-the-move.onrender.com/health
      expected_commit:
        description: Commit SHA to wait for. Defaults to the dispatched commit.
        required: false

concurrency:
  group: render-verify-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  verify:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      PUBLIC_HEALTH_URL: ${{ github.event.inputs.health_url || vars.PUBLIC_HEALTH_URL || 'https://jc-on-the-move.onrender.com/health' }}
      EXPECTED_COMMIT: ${{ github.event.inputs.expected_commit || github.event.workflow_run.head_sha || github.sha }}
      DEPLOY_WAIT_ATTEMPTS: ${{ vars.DEPLOY_WAIT_ATTEMPTS || '50' }}
      DEPLOY_WAIT_SECONDS: ${{ vars.DEPLOY_WAIT_SECONDS || '30' }}
      DEPLOY_CHECK_TIMEOUT_MS: ${{ vars.DEPLOY_CHECK_TIMEOUT_MS || '15000' }}
      RENDER_VERIFY_INITIAL_DELAY_SECONDS: ${{ vars.RENDER_VERIFY_INITIAL_DELAY_SECONDS || '30' }}
    steps:
      - name: Checkout deploy verifier
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Let Render start checks-pass deploy
        run: sleep "$RENDER_VERIFY_INITIAL_DELAY_SECONDS"

      - name: Verify public deployment
        run: |
          echo "Waiting for $PUBLIC_HEALTH_URL to report ${EXPECTED_COMMIT:0:8}"
          for attempt in $(seq 1 "$DEPLOY_WAIT_ATTEMPTS"); do
            echo "Production verify attempt $attempt/$DEPLOY_WAIT_ATTEMPTS"
            if node scripts/check-production-deploy.mjs "$PUBLIC_HEALTH_URL"; then
              exit 0
            fi
            sleep "$DEPLOY_WAIT_SECONDS"
          done
          echo "Render deploy did not become publicly verifiable in time."
          exit 1
