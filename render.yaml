services:
  - type: web
    name: jc-on-the-move
    runtime: node
    plan: starter
    region: ohio
    branch: main
    autoDeployTrigger: commit
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: SQUARE_ACCESS_TOKEN
        sync: false
      - key: SQUARE_ENVIRONMENT
        sync: false
      - key: APP_URL
        sync: false
      - key: MOONSHOT_TOKEN_ADDRESS
        sync: false
      - key: TREASURY_WALLET_PRIVATE_KEY
        sync: false
      - key: TREASURY_WALLET_PUBLIC_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: COMPANY_EMAIL
        sync: false
      - key: COMPANY_PHONE
        sync: false
      - key: VITE_SOLANA_RPC_URL
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: BTC_WALLET_ADDRESS
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_EMAIL
        sync: false
